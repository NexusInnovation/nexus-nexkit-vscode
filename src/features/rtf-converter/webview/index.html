<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src {{cspSource}} 'unsafe-inline'; script-src 'nonce-{{nonce}}';">
    <title>Nexkit: RTF to Markdown</title>
    <style>
        .rich-text-editor {
            line-height: 1.45;
        }

        .rich-text-editor h1,
        .rich-text-editor h2,
        .rich-text-editor h3,
        .rich-text-editor h4,
        .rich-text-editor h5,
        .rich-text-editor h6 {
            margin: 0.75em 0 0.4em;
            line-height: 1.2;
        }

        .rich-text-editor h1 { font-size: 1.5em; }
        .rich-text-editor h2 { font-size: 1.25em; }
        .rich-text-editor h3 { font-size: 1.1em; }

        .rich-text-editor p {
            margin: 0.5em 0;
        }

        .rich-text-editor ul,
        .rich-text-editor ol {
            margin: 0.5em 0;
            padding-left: 2em;
        }

        .rich-text-editor li {
            margin: 0.2em 0;
        }

        .rich-text-editor table {
            width: 100%;
            border-collapse: collapse;
            margin: 0.75em 0;
        }

        .rich-text-editor th,
        .rich-text-editor td {
            border: 1px solid var(--vscode-editorWidget-border);
            padding: 0.4em 0.6em;
            text-align: left;
            vertical-align: top;
        }

        .rich-text-editor th {
            background: var(--vscode-editor-inactiveSelectionBackground);
            font-weight: 600;
        }

        .rich-text-editor td > :first-child,
        .rich-text-editor th > :first-child {
            margin-top: 0;
        }

        .rich-text-editor td > :last-child,
        .rich-text-editor th > :last-child {
            margin-bottom: 0;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script nonce="{{nonce}}" src="{{scriptUri}}"></script>
</body>
</html>
