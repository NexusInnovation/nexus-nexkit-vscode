name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

  workflow_dispatch:
    inputs:
      create_release:
        description: "Set to true to create a release when manually triggering the workflow"
        required: false
        type: boolean
        default: true

permissions:
  contents: read

env:
  NODE_VERSION: "22.x"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Job 1: Commit Message Validation (PRs only)
  commitlint:
    name: Validate Commit Messages
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - name: Install dependencies
        run: npm ci --ignore-scripts
      - name: Validate commits
        run: |
          npx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose
      - name: Provide guidance on failure
        if: failure()
        run: |
          echo "::error::Commit messages do not follow Conventional Commits format"
          echo ""
          echo "Please format commit messages as: <type>(<scope>): <subject>"
          echo ""
          echo "Valid types: feat, fix, docs, style, refactor, perf, test, chore, ci, build"
          echo ""
          echo "Examples:"
          echo "  feat(templates): add Python template support"
          echo "  fix(mcp): resolve config path on macOS"
          echo "  docs: update installation instructions"
          echo ""
          echo "See CONTRIBUTING.md for full guidelines"

  # Job 2: Static Analysis (single runner)
  static-analysis:
    name: Static Analysis
    runs-on: ubuntu-latest
    if: github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Type checking
        run: npm run check:types
      - name: Lint code
        run: npm run lint

  # Job 3: Tests (3-OS matrix, depends on static-analysis)
  test:
    name: Test (${{ matrix.os }})
    needs: [static-analysis]
    runs-on: ${{ matrix.os }}
    if: github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]')
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb \
            libgtk-3-0 libgbm1 libnss3 libnspr4 libasound2-dev \
            libxkbcommon0 libatk1.0-0 libatk-bridge2.0-0 \
            libcups2 libdrm2 libxcomposite1 libxdamage1 \
            libxrandr2 libpango-1.0-0 libcairo2

      - name: Start Xvfb
        if: runner.os == 'Linux'
        run: |
          export DISPLAY=:99
          Xvfb :99 -screen 0 1920x1080x16 &

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Compile TypeScript
        run: npm run test-compile

      - name: Run tests
        if: runner.os != 'Linux'
        run: node ./out/test/runTest.js
      - name: Run tests (headless)
        if: runner.os == 'Linux'
        run: xvfb-run -a node ./out/test/runTest.js

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}
          path: test-results/
          retention-days: 30

  # Job 4: Security Scanning
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    if: github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --omit=dev --audit-level=high
        continue-on-error: false

  # Job 5: CodeQL Analysis

  # Job 6: Build & Package (PRs only — safety gate)
  build:
    name: Build Extension
    needs: [static-analysis, security]
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'pull_request' &&
      (github.base_ref == 'main' || github.base_ref == 'develop')
    outputs:
      vsix-name: ${{ steps.package.outputs.vsix-name }}
      vsix-size: ${{ steps.size.outputs.size }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build extension
        run: npm run build:ci

      - name: Package extension
        id: package
        run: |
          npx @vscode/vsce package --out nexkit-vscode.vsix
          echo "vsix-name=nexkit-vscode.vsix" >> $GITHUB_OUTPUT

      - name: Get package size
        id: size
        run: |
          SIZE=$(stat -c%s nexkit-vscode.vsix)
          echo "size=$SIZE" >> $GITHUB_OUTPUT
          echo "Extension size: $(numfmt --to=iec-i --suffix=B $SIZE)"

      - name: Check bundle size
        run: |
          MAX_SIZE=524288
          ACTUAL_SIZE=${{ steps.size.outputs.size }}
          if [ $ACTUAL_SIZE -gt $MAX_SIZE ]; then
            echo "::warning::Extension size ($ACTUAL_SIZE bytes) exceeds target ($MAX_SIZE bytes)"
          fi

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: nexkit-vscode-vsix
          path: nexkit-vscode.vsix
          retention-days: 30

  # Job 7: Release (semantic-release) - Only for push to main/develop
  release:
    name: Release (semantic-release)
    needs: [test, security]
    runs-on: ubuntu-latest
    # Run on push to main/develop OR on PRs targeting develop (for beta testing)
    if: |
      (
        github.event_name == 'push' &&
        (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop') &&
        (!contains(github.event.head_commit.message, '[skip ci]'))
      ) || (
        github.event_name == 'pull_request' &&
        (github.base_ref == 'main' || github.base_ref == 'develop')
      ) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.create_release == 'true')

    concurrency:
      group: release-${{ github.event_name }}-${{ github.ref }}-${{ github.event.pull_request.number || '' }}
      cancel-in-progress: false
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # For PRs, checkout the merge commit to test what would be merged
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install dependencies
        run: npm ci

      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release

  # Job 8: Preview Build for PRs to develop (creates beta-preview packages)
  pr-preview:
    name: PR Preview Build
    needs: [test, security]
    runs-on: ubuntu-latest
    if: (github.event_name == 'pull_request' && github.event.pull_request.base.ref == 'develop')  ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.create_release == 'true')
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Calculate preview version
        id: preview-version
        run: |
          # Get base version from package.json
          BASE_VERSION=$(node -p "require('./package.json').version")

          # Get PR number
          PR_NUMBER=${{ github.event.pull_request.number }}

          # Get short commit SHA
          SHORT_SHA=$(git rev-parse --short HEAD)

          # Create preview version: base-beta-pr<number>+<sha>
          PREVIEW_VERSION="${BASE_VERSION}-beta-pr${PR_NUMBER}+${SHORT_SHA}"

          echo "version=$PREVIEW_VERSION" >> $GITHUB_OUTPUT
          echo "📦 Preview version: $PREVIEW_VERSION"

      - name: Update package.json with preview version
        run: |
          npm version ${{ steps.preview-version.outputs.version }} --no-git-tag-version

      - name: Build extension
        run: npm run build:ci

      - name: Package VSIX
        run: |
          npx @vscode/vsce package --out nexkit-vscode-${{ steps.preview-version.outputs.version }}.vsix

      - name: Upload preview VSIX
        uses: actions/upload-artifact@v4
        with:
          name: nexkit-vscode-${{ steps.preview-version.outputs.version }}
          path: nexkit-vscode-${{ steps.preview-version.outputs.version }}.vsix
          retention-days: 30

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const version = '${{ steps.preview-version.outputs.version }}';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            await github.rest.issues.createComment({
              issue_number: context.payload.pull_request.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🎉 **Preview Build Ready**\n\n` +
                    `📦 Version: \`${version}\`\n` +
                    `📥 [Download VSIX](${runUrl})\n\n` +
                    `This preview build is available in the workflow artifacts for testing.`
            });
